{% extends "base.html" %}
{% block content %}
<div class="text-center py-12">
    <h1 class="text-3xl font-bold text-[#2A2B31] mb-4">{{ page.title }}</h1>
    <p class="text-gray-600 mb-4 max-w-2xl mx-auto">{{ page.description | default(value="") }}</p>

    {# Display taxonomy badges #}
    <div class="flex flex-wrap gap-2 justify-center mb-8">
        {% include "partials/badges.html" %}
    </div>

    {# Display page content #}
    <div class="prose max-w-4xl mx-auto mb-12 text-left">
        {{ page.content | safe }}
    </div>
    
    <style>
        .prose h2 {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2A2B31;
            margin-bottom: 1rem;
        }
    </style>

    <a
        href="{{ page.extra.external_url | default(value="#") | safe }}"
        class="inline-flex items-center justify-center bg-[#FFC107] hover:bg-[#E0A800] text-[#2A2B31] px-6 py-3 rounded-lg font-medium transition-colors text-lg"
    >
        Show the lesson
        <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
        </svg>
    </a>
</div>
{% endblock %}
