# The URL the site will be built for
base_url = "https://enccs.se"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = false

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

taxonomies = [
    { name = "skill", feed = false, render = false },
    { name = "difficulty", feed = false, render = false },
    { name = "maturity", feed = false, render = false },
    { name = "category", feed = false, render = false },
]

[markdown]

[markdown.highlighting]
theme = "catppuccin-mocha"

[search]
index_format = "fuse_javascript" # or "fuse_json"

[extra]
# Put all your custom variables here
# Define badge colors for Skill, Difficulty Level, and Maturity
badge_colors = {
    skill = {
        hpc = "bg-blue-500",
        ai = "bg-cyan-500",
        programming = "bg-orange-500",
        gpu = "bg-purple-500",
        cpu = "bg-green-500",
        molecular_dynamics = "bg-pink-500",
        electronic_structure = "bg-indigo-500",
        quantum_computing = "bg-violet-500",
        computational_fluid_dynamics = "bg-teal-500",
        plasma_physics = "bg-rose-500",
        programming_tools = "bg-amber-500",
        instructor_training = "bg-slate-500"
    },
    category = {
        basics_of_hpc = "bg-blue-600",
        ai = "bg-cyan-600",
        gpu_programming = "bg-purple-600",
        cpu_programming = "bg-green-600",
        molecular_dynamics = "bg-pink-600",
        electronic_structure_calculations = "bg-indigo-600",
        quantum_computing = "bg-violet-600",
        computational_fluid_dynamics = "bg-teal-600",
        plasma_physics = "bg-rose-600",
        programming_tools = "bg-amber-600",
        high_level_language_programming = "bg-orange-600",
        instructor_training_program = "bg-slate-600"
    },
    difficulty = { beginner = "text-emerald-400", intermediate = "text-amber-400", advanced = "text-red-400" },
    maturity = { alpha = "text-sky-400", beta = "text-blue-400", stable = "text-blue-500" }
}

